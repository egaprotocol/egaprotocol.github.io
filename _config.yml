title: EGAProtocol
tagline: "The open protocol that brings discipline to AI agents."
description: >-
  EGAProtocol (EGAP) is the open wire-level governance standard for enterprise AI
  agents. The 5AG Governance Framework — Authentication, Authorization, Audit,
  Approvals, Alerts — enforced on every agentic action. Designed for regulated
  industries: banking, healthcare, defense, government, and critical
  infrastructure. Complementary to MCP and A2A. Apache 2.0, developed at
  MIRASTACK LABS.
keywords: >-
  EGAProtocol, EGAP, 5AG, 5AG Governance Framework, AI governance, enterprise AI,
  AI agent protocol, agent governance, AI compliance, AI audit, AI authorization,
  AI authentication, AI approvals, AI alerts, human-in-the-loop, HITL, agent
  orchestration, MCP, A2A, Model Context Protocol, Agent to Agent, regulated AI,
  sovereign AI, air-gapped AI, AI safety, responsible AI, AI wire protocol, open
  protocol, specification, MIRASTACK LABS, BFSI AI, healthcare AI, defense AI,
  public sector AI
locale: en_US
lang: en
logo: /assets/img/egap-mark.svg

url: "https://egaprotocol.org"
baseurl: ""

# Google Analytics
# Privacy-first analytics: Plausible (cookieless, GDPR / DPDP-compliant).
# Loaded directly in _layouts/default.html — no Jekyll plugin needed.
analytics:
  provider: plausible
  domain: egaprotocol.org

author:
  name: MIRASTACK LABS Private Limited
  email: hello@egaprotocol.org
  url: https://mirastacklabs.ai

publisher:
  name: MIRASTACK LABS Private Limited
  url: https://mirastacklabs.ai
  logo: https://egaprotocol.org/assets/img/mirastack-logo.svg

# Social
twitter:
  username: egaprotocol
  card: summary_large_image

social:
  name: EGAProtocol
  links:
    - https://github.com/egaprotocol
    - https://twitter.com/egaprotocol

# OG image (1200x630 PNG)
image: /assets/img/egap-og-image.png

# Spec version
spec_version: "0.1"
spec_status: "Working Draft"
spec_url: "https://github.com/egaprotocol/spec/blob/main/SPEC.md"
github_org: "https://github.com/egaprotocol"
contact_email: "hello@egaprotocol.org"

# Build
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

highlighter: rouge
permalink: pretty

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .github
  - vendor
  - node_modules

# Include dotfile paths (security.txt lives under .well-known/)
include:
  - .well-known
