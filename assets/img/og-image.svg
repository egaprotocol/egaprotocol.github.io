<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="40%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#00C9B1" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#00C9B1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background — mira-bg-dark -->
  <rect width="1200" height="630" fill="#090C10"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Border — mira-border-dark -->
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="#1C2230" stroke-width="1.5"/>

  <!-- Three-slat mark (large): horizontal-logo polygons at scale 3.5 -->
  <!-- Original height 52 → 182px; width 60 → 210px; translate right to x=880 -->
  <g transform="translate(900, 224) scale(3.5)" opacity="0.12">
    <polygon points="0,52 14,0 24,0 10,52" fill="#00C9B1"/>
    <polygon points="18,52 32,0 42,0 28,52" fill="#FF671F"/>
    <polygon points="36,52 50,0 60,0 46,52" fill="#CED4DA"/>
  </g>

  <!-- Badge — signal orange -->
  <rect x="80" y="72" width="210" height="32" rx="4" fill="#FF671F" fill-opacity="0.10" stroke="#FF671F" stroke-opacity="0.25" stroke-width="1"/>
  <text x="185" y="94" font-family="JetBrains Mono, Courier New, monospace" font-size="12" font-weight="700" fill="#FF671F" text-anchor="middle" letter-spacing="2">EGAP v0.1 · DRAFT</text>

  <!-- Three-slat mark — scale(1.0): height=52px matches JetBrains Mono cap-height at 72px -->
  <!-- Cap-line: y=184 (=236-52), baseline: y=236 -->
  <g transform="translate(80, 184) scale(1.0)">
    <polygon points="0,52 14,0 24,0 10,52" fill="#00C9B1"/>
    <polygon points="18,52 32,0 42,0 28,52" fill="#FF671F"/>
    <polygon points="36,52 50,0 60,0 46,52" fill="#CED4DA"/>
  </g>

  <!-- Wordmark — mark right edge=140, gap=16 → wordmark x=156 -->
  <text y="236" font-family="JetBrains Mono, Courier New, monospace" font-size="72"><tspan x="156" font-weight="700" fill="#00C9B1" letter-spacing="4">EGAP</tspan><tspan font-weight="400" fill="#6B7480" letter-spacing="1" dx="-4">rotocol</tspan></text>

  <!-- Tagline -->
  <text x="80" y="310" font-family="JetBrains Mono, Courier New, monospace" font-size="22" fill="#7A8694" font-weight="400" letter-spacing="0.5">The open protocol that brings discipline to AI agents.</text>

  <!-- Primitive chips — teal, 4px radius, monospace uppercase -->
  <g transform="translate(80, 400)">
    <rect width="106" height="28" rx="4" fill="#00C9B1" fill-opacity="0.08" stroke="#00C9B1" stroke-opacity="0.30" stroke-width="1"/>
    <text x="53" y="19" font-family="JetBrains Mono, Courier New, monospace" font-size="11" fill="#00C9B1" text-anchor="middle" font-weight="700" letter-spacing="1.5">AUTH</text>
  </g>
  <g transform="translate(200, 400)">
    <rect width="144" height="28" rx="4" fill="#00C9B1" fill-opacity="0.08" stroke="#00C9B1" stroke-opacity="0.30" stroke-width="1"/>
    <text x="72" y="19" font-family="JetBrains Mono, Courier New, monospace" font-size="11" fill="#00C9B1" text-anchor="middle" font-weight="700" letter-spacing="1.5">AUTHORIZATION</text>
  </g>
  <g transform="translate(358, 400)">
    <rect width="84" height="28" rx="4" fill="#00C9B1" fill-opacity="0.08" stroke="#00C9B1" stroke-opacity="0.30" stroke-width="1"/>
    <text x="42" y="19" font-family="JetBrains Mono, Courier New, monospace" font-size="11" fill="#00C9B1" text-anchor="middle" font-weight="700" letter-spacing="1.5">AUDIT</text>
  </g>
  <g transform="translate(456, 400)">
    <rect width="110" height="28" rx="4" fill="#00C9B1" fill-opacity="0.08" stroke="#00C9B1" stroke-opacity="0.30" stroke-width="1"/>
    <text x="55" y="19" font-family="JetBrains Mono, Courier New, monospace" font-size="11" fill="#00C9B1" text-anchor="middle" font-weight="700" letter-spacing="1.5">APPROVALS</text>
  </g>
  <g transform="translate(580, 400)">
    <rect width="84" height="28" rx="4" fill="#00C9B1" fill-opacity="0.08" stroke="#00C9B1" stroke-opacity="0.30" stroke-width="1"/>
    <text x="42" y="19" font-family="JetBrains Mono, Courier New, monospace" font-size="11" fill="#00C9B1" text-anchor="middle" font-weight="700" letter-spacing="1.5">ALERTS</text>
  </g>

  <!-- Divider -->
  <line x1="80" y1="510" x2="1120" y2="510" stroke="#1C2230" stroke-width="1"/>

  <!-- Attribution footer -->
  <text x="80" y="540" font-family="JetBrains Mono, Courier New, monospace" font-size="13" fill="#4A5563" letter-spacing="0.5">egaprotocol.org · Apache 2.0 · An open specification by MIRASTACK LABS Private Limited</text>
</svg>
